# Cairn node WiFi hotspot configuration
# 5GHz 802.11ac — requires Pi 4 or Pi 5 with ac-capable WiFi
#
# For older Pi models (Pi 3B / Pi Zero 2W) that lack 5GHz support,
# fall back to 2.4GHz by changing:
#   hw_mode=g
#   channel=6        (or 1/11)
#   # remove ieee80211ac=1 and the ht_capab/vht lines

interface=wlan0
driver=nl80211

ssid=Cairn
country_code=GB

hw_mode=a
channel=36
ieee80211n=1
ieee80211ac=1

# 5GHz HT/VHT capabilities (Pi 4/5 BCM43455/BCM43456)
ht_capab=[HT40+][SHORT-GI-20][SHORT-GI-40]
vht_capab=[SHORT-GI-80]
vht_oper_chwidth=1
vht_oper_centr_freq_seg0_idx=42

wmm_enabled=1
auth_algs=1
ignore_broadcast_ssid=0

wpa=2
wpa_passphrase=cairnnode
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP
