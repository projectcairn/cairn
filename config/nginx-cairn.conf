server {
    listen 80 default_server;
    server_name _;

    # ------------------------------------------------------------------ #
    # Captive portal detection endpoints                                   #
    # Redirects OS probes to the dashboard so devices show the portal UI. #
    # ------------------------------------------------------------------ #

    # Android
    location = /generate_204 {
        return 302 http://192.168.4.1/;
    }

    # Apple
    location = /hotspot-detect.html {
        return 302 http://192.168.4.1/;
    }

    # Microsoft
    location = /connecttest.txt {
        return 302 http://192.168.4.1/;
    }
    location = /ncsi.txt {
        return 302 http://192.168.4.1/;
    }

    # ------------------------------------------------------------------ #
    # Dashboard                                                            #
    # ------------------------------------------------------------------ #
    location / {
        root /opt/cairn/dashboard;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # ------------------------------------------------------------------ #
    # Kiwix (ZIM reader) — proxied on localhost:8080                      #
    # ------------------------------------------------------------------ #
    location /kiwix/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ------------------------------------------------------------------ #
    # Tile server (mbtileserver) — proxied on localhost:8000              #
    # ------------------------------------------------------------------ #
    location /tiles/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ------------------------------------------------------------------ #
    # Static file downloads from /opt/cairn/data/                        #
    # ------------------------------------------------------------------ #
    location /files/ {
        alias      /opt/cairn/data/;
        autoindex  on;
    }
}
