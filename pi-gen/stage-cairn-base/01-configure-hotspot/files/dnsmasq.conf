# Cairn node dnsmasq configuration
# DHCP server and captive-portal DNS redirect on wlan0

interface=wlan0
bind-interfaces

# DHCP range — leases last 24 hours
dhcp-range=192.168.4.2,192.168.4.20,255.255.255.0,24h

# Redirect ALL DNS queries to the Cairn dashboard (captive portal)
address=/#/192.168.4.1

# Don't read /etc/resolv.conf or forward upstream
no-resolv
no-poll
